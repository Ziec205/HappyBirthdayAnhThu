<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật Em Yêu ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #0a1428, #1e3a5f, #2c5aa0);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Stars */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Astronaut */
        .astronaut {
            position: fixed;
            font-size: 60px;
            animation: float-astronaut 20s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes float-astronaut {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(100px, -50px) rotate(15deg);
            }
            50% {
                transform: translate(50px, -100px) rotate(-10deg);
            }
            75% {
                transform: translate(-50px, -50px) rotate(10deg);
            }
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        .container {
            text-align: center;
            padding: 50px;
            background: transparent;
            border-radius: 20px;
            max-width: 700px;
            width: 90%;
            position: relative;
            z-index: 10;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cake {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 2.5em;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1.5em;
            color: #ffffff;
            margin-bottom: 30px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.5);
        }

        .message {
            font-size: 1.2em;
            line-height: 1.8;
            color: #ffffff;
            margin: 25px 0;
            padding: 20px;
            background: rgba(74, 123, 200, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .btn {
            background: linear-gradient(135deg, #2c5aa0, #4a7bc8);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(44, 90, 160, 0.4);
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(44, 90, 160, 0.6);
        }

        .hidden {
            display: none;
        }

        .special-message {
            font-size: 1.3em;
            color: #2c5aa0;
            margin: 25px 0;
            padding: 25px;
            background: linear-gradient(135deg, #e8f4fd, #cfe9ff);
            border-radius: 15px;
            border: 2px solid #4a7bc8;
        }

        .footer {
            margin-top: 30px;
            font-size: 1.1em;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.5);
        }

        /* Planet */
        .planet {
            position: fixed;
            border-radius: 50%;
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg) translateX(300px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(300px) rotate(-360deg); }
        }

        /* Big Birthday Cake */
        .big-cake {
            font-size: 200px;
            margin: 20px 0;
            animation: cakeBounce 1.2s ease-out;
            filter: drop-shadow(0 0 30px rgba(74, 123, 200, 0.6));
        }

        @keyframes cakeBounce {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            60% { transform: scale(1.15) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .birthday-text {
            font-size: 2.5em;
            color: #ffffff;
            font-weight: bold;
            margin-top: 20px;
            animation: fadeIn 1s ease-out 0.5s both;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
        }

        /* Firework */
        .firework {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
            animation: explode 1.5s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y));
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cake">🎂</div>
        <h1>🎉 Chúc Mừng Sinh Nhật! 🎉</h1>
        <div class="subtitle"> Cà Ry Anh Thư 💙</div>
        
        <div class="message">
            💫 Bớt mê game<br>
            ⭐ Bớt láo<br>
            ✨ Bớt Matday<br>
            <br>
            <small>(2 cái trên không bớt cũng không sao,<br>bớt cái thứ 3 là được)</small>
        </div>

        <button id="surpriseBtn" class="btn" onclick="showSurprise()">🎁 Nhấn để nhận quà 🎁</button>

        <div id="cakeDisplay" class="hidden">
            <div class="big-cake">🎂</div>
            <div class="birthday-text">Happy Birthday! 🎉</div>
        </div>

        <div class="footer">
            💙 With Love 💙
        </div>
    </div>

    <!-- Hidden SoundCloud Player -->
    <div style="position: fixed; bottom: -500px; left: 0;">
        <iframe id="birthdayMusic" width="0" height="0" 
                src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/discover/sets/track-stations:183875124&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false" 
                frameborder="0" allow="autoplay" scrolling="no">
        </iframe>
    </div>

    <script>
        function showSurprise() {
            // Hide everything in container except cake display
            document.querySelector('.cake').style.display = 'none';
            document.querySelector('h1').style.display = 'none';
            document.querySelector('.subtitle').style.display = 'none';
            document.querySelector('.message').style.display = 'none';
            document.getElementById('surpriseBtn').style.display = 'none';
            document.querySelector('.footer').style.display = 'none';
            
            // Show only the new cake
            document.getElementById('cakeDisplay').classList.remove('hidden');
            
            // Play SoundCloud music
            const music = document.getElementById('birthdayMusic');
            music.src = music.src.replace('auto_play=false', 'auto_play=true');
            
            // Create big fireworks
            createBigFireworks();
            
            // Continue fireworks every 2 seconds
            const fireworkInterval = setInterval(() => {
                createBigFireworks();
            }, 2000);
        }

        // Create big fireworks effect
        function createBigFireworks() {
            const colors = ['#4a7bc8', '#2c5aa0', '#64b5f6', '#42a5f5', '#90caf9', '#ffd700', '#ff6b9d'];
            const fireworkCount = 5;
            
            for (let i = 0; i < fireworkCount; i++) {
                setTimeout(() => {
                    const centerX = (window.innerWidth * 0.2) + Math.random() * (window.innerWidth * 0.6);
                    const centerY = (window.innerHeight * 0.1) + Math.random() * (window.innerHeight * 0.4);
                    
                    // Create more particles for bigger effect
                    const particleCount = 50;
                    for (let j = 0; j < particleCount; j++) {
                        const particle = document.createElement('div');
                        particle.className = 'firework';
                        
                        const angle = (Math.PI * 2 * j) / particleCount;
                        const velocity = 80 + Math.random() * 80;
                        const x = Math.cos(angle) * velocity;
                        const y = Math.sin(angle) * velocity;
                        
                        particle.style.left = centerX + 'px';
                        particle.style.top = centerY + 'px';
                        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                        particle.style.setProperty('--x', x + 'px');
                        particle.style.setProperty('--y', y + 'px');
                        
                        document.body.appendChild(particle);
                        
                        setTimeout(() => particle.remove(), 1500);
                    }
                }, i * 400);
            }
        }

        // Create stars
        function createStars() {
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
                star.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(star);
            }
        }

        // Create astronauts
        function createAstronauts() {
            const positions = [
                { left: '10%', top: '20%', delay: '0s' },
                { left: '80%', top: '30%', delay: '5s' },
                { left: '20%', top: '70%', delay: '10s' }
            ];
            
            positions.forEach(pos => {
                const astronaut = document.createElement('div');
                astronaut.className = 'astronaut';
                astronaut.textContent = '🚀';
                astronaut.style.left = pos.left;
                astronaut.style.top = pos.top;
                astronaut.style.animationDelay = pos.delay;
                document.body.appendChild(astronaut);
            });
        }

        // Create planets
        function createPlanets() {
            const planets = ['🪐', '🌎', '🌙'];
            planets.forEach((planet, i) => {
                const elem = document.createElement('div');
                elem.className = 'planet';
                elem.textContent = planet;
                elem.style.fontSize = '40px';
                elem.style.left = '50%';
                elem.style.top = '50%';
                elem.style.animationDelay = i * 10 + 's';
                elem.style.animationDuration = (30 + i * 10) + 's';
                document.body.appendChild(elem);
            });
        }

        // Initialize
        createStars();
        createAstronauts();
        createPlanets();
    </script>
</body>
</html>
